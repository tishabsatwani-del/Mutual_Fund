name: Deploy to GitHub Pages

# Publishes the static SIP Crash Behavior Simulator (root of the repo).
# Two-job split (GitHub's standard pattern): the build job has no environment
# gate, so `configure-pages` can auto-enable Pages on the very first run;
# the deploy job then publishes to the github-pages environment.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # auto-enable Pages on first run, so no manual Settings step is needed
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
